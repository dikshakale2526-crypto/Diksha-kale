<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Webpage Example</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
}

#contentBox{
    width:300px;
    margin:auto;
    padding:20px;
    border:2px solid #333;
    border-radius:10px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Dynamic Webpage</h1>

<div id="contentBox">
    <p id="text">Click the button to change this content.</p>
</div>

<button id="changeBtn">Update Content</button>

<script>

$(document).ready(function(){

    $("#changeBtn").click(function(){

        $("#text").text("🎉 The content has been updated dynamically!");

        $("#contentBox").css({
            "background-color":"#d4edda",
            "border-color":"#28a745"
        });

    });

});

</script>

</body>
</html>
