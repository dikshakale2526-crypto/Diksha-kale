<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

form{
    width:350px;
    margin:50px auto;
    padding:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}

input, select{
    width:100%;
    padding:8px;
    margin:8px 0;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px;
    width:100%;
}
</style>
</head>

<body>

<form action="process.php" method="post">
<h2>User Registration</h2>

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Phone</label>
<input type="text" name="phone">

<button type="submit">Register</button>

</form>

</body>
</html>
