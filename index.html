<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS3 Styling Example</title>

<style>
body{
    background-color:#f0f8ff;
    font-family: Arial, sans-serif;
    text-align:center;
    margin:40px;
}

/* Color and Font Example */
.title{
    color:#2c3e50;
    font-size:40px;
    font-family: Georgia, serif;
}

/* Border Example */
.box{
    border:4px solid #3498db;
    border-radius:12px;
    padding:20px;
    width:60%;
    margin:auto;
    background-color:#ffffff;
}

/* Text Effects */
.text-effect{
    color:#e74c3c;
    font-size:24px;
    text-shadow:2px 2px 5px gray;
    letter-spacing:2px;
}

/* Button Style */
.button{
    background-color:#27ae60;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.button:hover{
    background-color:#1e8449;
}
</style>

</head>
<body>

<h1 class="title">CSS3 Styling Demo</h1>

<div class="box">
    <p class="text-effect">This text uses CSS3 text effects.</p>
    <p>Example of colors, fonts, borders, and styling.</p>
    <button class="button">Click Me</button>
</div>

</body>
</html>
