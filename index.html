<!DOCTYPE html>
<html>
<head>
<title>AJAX Search Suggestion</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    font-family: Arial;
    margin: 50px;
}

#searchBox{
    width:300px;
    padding:10px;
}

#suggestions{
    width:300px;
    border:1px solid #ccc;
    display:none;
}

.suggestion-item{
    padding:8px;
    cursor:pointer;
}

.suggestion-item:hover{
    background:#f0f0f0;
}
</style>

</head>

<body>

<h2>Search with AJAX Suggestions</h2>

<input type="text" id="searchBox" placeholder="Type to search...">

<div id="suggestions"></div>

<script>

$(document).ready(function(){

$("#searchBox").keyup(function(){

let query = $(this).val();

if(query.length > 0){

$.ajax({
url: "search.php",
method: "POST",
data: {search: query},

success: function(data){
$("#suggestions").html(data);
$("#suggestions").show();
}

});

}else{
$("#suggestions").hide();
}

});

$(document).on("click",".suggestion-item",function(){
$("#searchBox").val($(this).text());
$("#suggestions").hide();
});

});

</script>

</body>
</html>
